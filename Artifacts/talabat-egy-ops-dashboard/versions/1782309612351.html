<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script>
// ── Config ───────────────────────────────────────────────
const TRACKER_ID = '1AJ5_lz7s0p-sZP4snjHsJrkPvI2agCYW9mqydA0sXKg';

// ── State ────────────────────────────────────────────────
let allVendors = [];
let currentTab = 0;
let activeCharts = [];

// ── Parser ───────────────────────────────────────────────
// Unescapes Markdown escapes: \_ → _   \. → .   \* → *   etc.
function mdUnescape(s) {
  return (s || '').replace(/\\([_.*`[\]()#!|\\])/g, '$1').trim();
}

function parseMdTable(raw) {
  const lines = raw.split('\n');
  let headerLine = null, startIdx = -1;

  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    // Header row contains chain_name (possibly escaped)
    if (l.includes('chain') && l.includes('name') && l.includes('|')) {
      headerLine = l;
      startIdx = i;
      break;
    }
  }
  if (!headerLine) return [];

  // Parse headers — strip outer pipes, split on |, unescape
  const headers = headerLine
    .split('|')
    .map(h => mdUnescape(h))
    .filter(h => h.length > 0);

  const rows = [];
  for (let i = startIdx + 1; i < lines.length; i++) {
    const l = lines[i].trim();
    if (!l) continue;
    // Skip alignment rows like | :-: | :-: |
    if (/^\|\s*:?-+:?\s*\|/.test(l)) continue;

    const cells = l.split('|').map(c => mdUnescape(c)).filter((_, idx, arr) => {
      // drop first and last empty entries from leading/trailing pipes
      return true;
    });

    // Remove leading empty cell from leading |
    const cleanCells = l.startsWith('|')
      ? cells.slice(1, cells.length - (l.endsWith('|') ? 1 : 0))
      : cells;

    if (cleanCells.length < 5) continue;

    const row = {};
    headers.forEach((h, j) => {
      row[h] = cleanCells[j] !== undefined ? cleanCells[j] : '';
    });
    if (!row['chain_name']) continue;
    rows.push(row);
  }
  return rows;
}

// ── Fetch ────────────────────────────────────────────────
async function fetchVendors() {
  const r = await window.cowork.callMcpTool(
    'mcp__bd165437-ca6e-4c7e-b958-528a192c1f95__read_file_content',
    { fileId: TRACKER_ID }
  );
  if (r.isError) throw new Error('Drive MCP returned error');
  const payload = r.structuredContent ?? JSON.parse(r.content[0].text);
  const raw = payload.fileContent || '';
  if (!raw) throw new Error('Empty file content');
  return parseMdTable(raw);
}

// ── Helpers ──────────────────────────────────────────────
function bool(v) {
  return v === true || String(v).toLowerCase() === 'true' || String(v).toLowerCase() === 'yes';
}
function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmt(n) { return Math.round(n).toLocaleString(); }
function egp(n) { const v = Math.round(num(n)); return v >= 1000 ? (v/1000).toFixed(1)+'K' : String(v); }

function badge(text, cls) {
  return gridjs.html(`<span class="badge b-${cls}">${text || '—'}</span>`);
}
function severityBadge(s) {
  return badge(s || 'New', { Critical:'critical', High:'high', Medium:'medium', Low:'low', New:'new' }[s] || 'new');
}
function improvBadge(s) {
  return badge(s || '—', { Improving:'improving', Deteriorating:'deteriorating', Stable:'stable', New:'new' }[s] || 'stable');
}
function commBadge(s) {
  if (!s || s === 'none' || s === 'Not Sent') return badge('Not sent', 'none');
  if (s === 'Sent') return badge('Sent', 'sent');
  if (s === 'Follow-Up Required') return badge('Follow-up', 'pending');
  if (s === 'Escalated') return badge('Escalated', 'escalated');
  if (s === 'Closed') return badge('Closed', 'complete');
  return badge(s, 'none');
}
function actionBadge(v) {
  if (bool(v.vendor_action_completed)) return badge('Completed', 'complete');
  if (v.action_verification_status === 'In Progress') return badge('In progress', 'inprog');
  if (v.action_verification_status === 'Rejected') return badge('Rejected', 'escalated');
  if (bool(v.vendor_action_required)) return badge('Pending', 'pending');
  return badge('Not required', 'none');
}
function riskDelta(v) {
  const d = num(v.risk_score_change);
  const color = d > 0 ? '#dc2626' : d < 0 ? '#16a34a' : '#9ca3af';
  const sign = d > 0 ? '+' : '';
  return gridjs.html(`<span style="color:${color};font-weight:500">${sign}${d}</span>`);
}

function metrics(...pairs) {
  return '<div class="metrics">' + pairs.map(([val, label, cls]) =>
    `<div class="metric"><div class="metric-val ${cls||''}">${val}</div><div class="metric-label">${label}</div></div>`
  ).join('') + '</div>';
}

function destroyCharts() {
  activeCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  activeCharts = [];
}

function makeGrid(containerId, columns, data) {
  if (!data.length) {
    document.getElementById(containerId).innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">No records</div>';
    return;
  }
  new gridjs.Grid({
    columns,
    data,
    sort: true,
    search: { enabled: true, placeholder: 'Search…' },
    pagination: { limit: 20, summary: true },
  }).render(document.getElementById(containerId));
}

// ── Tab renderers ────────────────────────────────────────

function renderTab0(v) {
  const active = v.filter(x => bool(x.is_active))
    .sort((a,b) => num(b.last_failed_orders) - num(a.last_failed_orders));
  const totalGmv = active.reduce((s,x) => s + num(x.last_lost_gmv), 0);
  const emailPending = active.filter(x => bool(x.email_required) && !bool(x.email_sent)).length;

  document.getElementById('mainContent').innerHTML =
    metrics(
      [active.length, 'Active cases'],
      [active.filter(x => x.recurrence_severity === 'Critical').length + active.filter(x => x.recurrence_severity === 'High').length, 'Critical / High', 'red'],
      [emailPending, 'Emails pending', 'amber'],
      [active.filter(x => x.improvement_status === 'Improving').length, 'Improving', 'green'],
      [active.filter(x => x.improvement_status === 'Deteriorating').length, 'Deteriorating', 'red'],
      [(totalGmv/1000).toFixed(0) + 'K EGP', 'Total lost GMV']
    ) +
    '<div class="table-wrap"><div id="g0"></div></div>';

  makeGrid('g0',
    ['Vendor', 'Cluster', 'City', {name:'Failed orders',sort:{compare:(a,b)=>Number(a)-Number(b)}}, 'Lost GMV', 'Fail rate %', 'Severity', 'Improvement'],
    active.map(x => [
      x.chain_name, x.cluster, x.city,
      num(x.last_failed_orders), egp(x.last_lost_gmv),
      num(x.last_fail_rate).toFixed(1)+'%',
      severityBadge(x.recurrence_severity),
      improvBadge(x.improvement_status)
    ])
  );
}

function renderTab1(v) {
  const ka = v.filter(x => x.cluster === 'key_accounts')
    .sort((a,b) => num(b.last_failed_orders) - num(a.last_failed_orders));

  document.getElementById('mainContent').innerHTML =
    metrics(
      [ka.length, 'Key accounts tracked'],
      [fmt(ka.reduce((s,x)=>s+num(x.last_failed_orders),0)), 'Total failed orders', 'red'],
      [(ka.reduce((s,x)=>s+num(x.last_lost_gmv),0)/1000).toFixed(0) + 'K EGP', 'Lost GMV'],
      [ka.filter(x=>bool(x.email_required)).length, 'Email required', 'amber']
    ) +
    '<div class="table-wrap"><div id="g1"></div></div>';

  makeGrid('g1',
    ['Vendor', 'City', 'Appearances', {name:'Failed orders',sort:{compare:(a,b)=>Number(a)-Number(b)}}, 'Lost GMV', 'Fail rate %', 'Severity', 'Improvement', 'Comm. status'],
    ka.map(x => [
      x.chain_name, x.city, num(x.appearances),
      num(x.last_failed_orders), egp(x.last_lost_gmv),
      num(x.last_fail_rate).toFixed(1)+'%',
      severityBadge(x.recurrence_severity),
      improvBadge(x.improvement_status),
      commBadge(x.communication_status)
    ])
  );
}

function renderTab2(v) {
  const req = v.filter(x => bool(x.email_required));
  const sent = req.filter(x => bool(x.email_sent));
  const responded = sent.filter(x => bool(x.response_received));
  const pending = req.filter(x => !bool(x.email_sent));

  document.getElementById('mainContent').innerHTML =
    metrics(
      [req.length, 'Email required'],
      [sent.length, 'Sent', 'green'],
      [pending.length, 'Pending send', 'amber'],
      [responded.length, 'Responses received', 'green']
    ) +
    '<div class="table-wrap"><div id="g2"></div></div>';

  makeGrid('g2',
    ['Vendor', 'Cluster', 'AM email', 'Required', 'Sent', 'Sent date', 'Status', 'Response', 'Classification'],
    v.map(x => [
      x.chain_name, x.cluster, x.am_email || '—',
      bool(x.email_required) ? 'Yes' : 'No',
      bool(x.email_sent) ? 'Yes' : 'No',
      x.email_sent_date || '—',
      commBadge(x.communication_status),
      bool(x.response_received) ? 'Yes' : 'No',
      x.response_classification || '—'
    ])
  );
}

function renderTab3(v) {
  const req = v.filter(x => bool(x.vendor_action_required));
  const done = req.filter(x => bool(x.vendor_action_completed));
  const pending = req.filter(x => !bool(x.vendor_action_completed));
  const needVerify = req.filter(x => x.action_verification_status === 'Verification Needed');

  document.getElementById('mainContent').innerHTML =
    metrics(
      [req.length, 'Action required'],
      [done.length, 'Completed', 'green'],
      [pending.length, 'Pending', 'amber'],
      [needVerify.length, 'Verification needed']
    ) +
    '<div class="table-wrap"><div id="g3"></div></div>';

  makeGrid('g3',
    ['Vendor', 'Cluster', 'City', 'Required', 'Status', 'Response classification'],
    v.map(x => [
      x.chain_name, x.cluster, x.city,
      bool(x.vendor_action_required) ? 'Yes' : 'No',
      actionBadge(x),
      x.response_classification || '—'
    ])
  );
}

function renderTab4(v) {
  const recurring = v.filter(x => num(x.appearances) >= 2)
    .sort((a,b) => num(b.appearances) - num(a.appearances));

  const sev = { Critical: 0, High: 0, Medium: 0, Low: 0 };
  recurring.forEach(x => { if (sev[x.recurrence_severity] !== undefined) sev[x.recurrence_severity]++; });

  const clusterMap = {};
  recurring.forEach(x => { clusterMap[x.cluster] = (clusterMap[x.cluster]||0)+1; });

  document.getElementById('mainContent').innerHTML =
    metrics(
      [recurring.length, 'Repeat offenders'],
      [sev.Critical, 'Critical', 'red'],
      [sev.High, 'High', 'amber'],
      [sev.Medium, 'Medium']
    ) +
    '<div class="chart-row">' +
      '<div class="chart-card"><div class="chart-title">Severity distribution</div><div style="position:relative;height:180px"><canvas id="sevChart"></canvas></div></div>' +
      '<div class="chart-card"><div class="chart-title">Recurring offenders by cluster</div><div style="position:relative;height:180px"><canvas id="clsChart"></canvas></div></div>' +
    '</div>' +
    '<div class="table-wrap"><div id="g4"></div></div>';

  activeCharts.push(new Chart(document.getElementById('sevChart'), {
    type: 'doughnut',
    data: { labels: Object.keys(sev), datasets: [{ data: Object.values(sev), backgroundColor: ['#dc2626','#d97706','#3b82f6','#10b981'], borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } } } }
  }));

  activeCharts.push(new Chart(document.getElementById('clsChart'), {
    type: 'bar',
    data: { labels: Object.keys(clusterMap), datasets: [{ label: 'Vendors', data: Object.values(clusterMap), backgroundColor: '#FF5A00', borderRadius: 4, borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  }));

  makeGrid('g4',
    ['Vendor', 'Cluster', 'City', {name:'Appearances',sort:{compare:(a,b)=>Number(a)-Number(b)}}, 'Consec. days', 'Severity', 'First seen', 'Last seen', 'Improvement'],
    recurring.map(x => [
      x.chain_name, x.cluster, x.city,
      num(x.appearances), num(x.consecutive_days),
      severityBadge(x.recurrence_severity),
      x.first_detection_date || '—', x.last_detection_date || '—',
      improvBadge(x.improvement_status)
    ])
  );
}

function renderTab5(v) {
  const improving = v.filter(x => x.improvement_status === 'Improving');
  const deteriorating = v.filter(x => x.improvement_status === 'Deteriorating');
  const stable = v.filter(x => x.improvement_status === 'Stable');
  const isNew = v.filter(x => x.improvement_status === 'New' || !x.improvement_status);

  document.getElementById('mainContent').innerHTML =
    metrics(
      [improving.length, 'Improving', 'green'],
      [stable.length, 'Stable'],
      [deteriorating.length, 'Deteriorating', 'red'],
      [isNew.length, 'New (no baseline)']
    ) +
    '<div class="chart-card" style="margin-bottom:14px"><div class="chart-title">Improvement status breakdown</div><div style="position:relative;height:150px"><canvas id="improvChart"></canvas></div></div>' +
    '<div class="table-wrap"><div id="g5"></div></div>';

  activeCharts.push(new Chart(document.getElementById('improvChart'), {
    type: 'bar',
    data: {
      labels: ['Improving', 'Stable', 'Deteriorating', 'New'],
      datasets: [{ data: [improving.length, stable.length, deteriorating.length, isNew.length], backgroundColor: ['#10b981','#9ca3af','#dc2626','#8b5cf6'], borderRadius: 4, borderWidth: 0 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  }));

  const sorted = [...v].sort((a,b) => num(b.current_risk_score) - num(a.current_risk_score));
  makeGrid('g5',
    ['Vendor', 'Cluster', 'City', 'Risk score', 'Change', 'Rank', 'Rank movement', 'Improvement', 'Appearances'],
    sorted.map(x => [
      x.chain_name, x.cluster, x.city,
      num(x.current_risk_score),
      riskDelta(x),
      num(x.current_rank) || '—',
      x.rank_movement || 'stable',
      improvBadge(x.improvement_status),
      num(x.appearances)
    ])
  );
}

const tabRenderers = [renderTab0, renderTab1, renderTab2, renderTab3, renderTab4, renderTab5];

// ── Tab switch ───────────────────────────────────────────
function switchTab(idx) {
  if (idx === currentTab && allVendors.length) return;
  currentTab = idx;
  for (let i = 0; i < 6; i++) document.getElementById('tb'+i).classList.toggle('active', i === idx);
  destroyCharts();
  if (allVendors.length) tabRenderers[idx](allVendors);
}

// ── Init ─────────────────────────────────────────────────
async function initDashboard() {
  destroyCharts();
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><br>Fetching Master Tracker from Google Drive…</div>';
  document.getElementById('statusLine').textContent = 'Loading…';
  document.getElementById('refreshBtn').disabled = true;

  try {
    allVendors = await fetchVendors();
    const active = allVendors.filter(x => bool(x.is_active)).length;
    document.getElementById('statusLine').textContent =
      `${allVendors.length} vendors · ${active} active · updated ${new Date().toLocaleTimeString()}`;
    localStorage.setItem('tlb_tracker_v2', JSON.stringify({ ts: Date.now(), data: allVendors }));
    tabRenderers[currentTab](allVendors);
  } catch(e) {
    const cached = localStorage.getItem('tlb_tracker_v2');
    if (cached) {
      try {
        const { ts, data } = JSON.parse(cached);
        allVendors = data;
        document.getElementById('statusLine').textContent =
          `Cached data from ${new Date(ts).toLocaleString()} · (live load failed: ${e.message})`;
        tabRenderers[currentTab](allVendors);
      } catch(e2) {
        document.getElementById('mainContent').innerHTML =
          `<div class="error-box">Failed to load: ${e.message}. Ensure Google Drive connector is connected.</div>`;
        document.getElementById('statusLine').textContent = 'Load failed';
      }
    } else {
      document.getElementById('mainContent').innerHTML =
        `<div class="error-box">Failed to load Master Tracker: ${e.message}.<br>Make sure the Google Drive connector is active and retry.</div>`;
      document.getElementById('statusLine').textContent = 'Load failed';
    }
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

initDashboard();
</script>
</body>
</html>
